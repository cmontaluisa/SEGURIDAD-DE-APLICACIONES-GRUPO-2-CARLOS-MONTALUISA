name: DevSecOps Pipeline (.NET 8)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

env:
  DOTNET_VERSION: '8.0.x'

jobs:

#########################################################
# SECURITY SCANS (EL FILTRO PRINCIPAL)
#########################################################

  security-scan:
    name: Security Scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Escaneo de Secretos (Bloquea si hay llaves expuestas)
      - name: Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. SAST rápido con Semgrep
      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          generateSarif: "1"

      # 3. Cache para la base de datos de vulnerabilidades (Acelera el pipeline)
      - name: Cache Dependency Check DB
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: dependency-check-cache

      # 4. Análisis de dependencias (NuGet)
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "dotnet-project"
          path: "."
          format: "HTML"
          out: "reports"

      # 5. Escaneo de vulnerabilidades con Bloqueo Activo
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1 # BLOQUEO: Si encuentra algo, el pipeline se detiene aquí.
          format: sarif
          output: trivy-results.sarif

      # 6. Carga de resultados a la pestaña Security (Incluso si falló el paso anterior)
      - name: Upload Security Results
        uses: github/codeql-action/upload-sarif@v3
        if: always() # Esto garantiza que veas los errores en la UI de GitHub aunque el job falle
        with:
          sarif_file: trivy-results.sarif

      # 7. Generación de SBOM para auditoría
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      # 8. Guardar reportes como artefactos
      - name: Archive Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            reports/
            sbom.spdx.json

#########################################################
# BUILD AND TEST (SOLO SI SEGURIDAD APRUEBA)
#########################################################

  build-and-test:
    name: Build and Test (.NET 8)
    runs-on: ubuntu-latest
    needs: security-scan # Si seguridad falla, no gastamos minutos de build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results (.NET 8)
          path: '**/*.trx'
          reporter: dotnet-trx

#########################################################
# ADVANCED SAST (ANÁLISIS PROFUNDO FINAL)
#########################################################

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: build-and-test # Solo analizamos profundamente código que compila y es seguro

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Build for CodeQL
        run: dotnet build --configuration Release

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
